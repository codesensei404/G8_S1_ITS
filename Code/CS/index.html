<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SOTA vs Dijkstra: Pro Routing Simulation</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root {
            --bg-color: #0f172a; 
            --card-bg: #1e293b; 
            --text-main: #f8fafc; 
            --text-muted: #94a3b8; 
            --dij-color: #ef4444; 
            --sota-color: #10b981; 
            --border-color: #334155; 
            --node-color: #3b82f6; 
        }
        body { font-family: 'Inter', 'Segoe UI', sans-serif; background: var(--bg-color); color: var(--text-main); margin: 0; padding: 20px; }
        .header { text-align: center; margin-bottom: 25px; }
        .header h2 { margin: 0; font-size: 1.8rem; color: #ffffff; letter-spacing: 0.5px; }
        .header p { color: var(--text-muted); margin-top: 5px; }
        
        .controls-container { display: flex; flex-wrap: wrap; gap: 20px; justify-content: center; margin-bottom: 25px; }
        .control-group { background: var(--card-bg); padding: 15px 25px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.3); border: 1px solid var(--border-color); display: flex; flex-direction: column; gap: 12px; flex: 1; min-width: 300px; max-width: 500px;}
        .control-group h3 { margin: 0; font-size: 1.1rem; border-bottom: 1px solid var(--border-color); padding-bottom: 8px; color: #e2e8f0; }
        
        .input-row { display: flex; justify-content: space-between; align-items: center; font-size: 0.95rem; }
        input { padding: 8px 12px; width: 80px; border: 1px solid var(--border-color); background: #0f172a; color: white; border-radius: 6px; outline: none; transition: border-color 0.2s; }
        input[type="text"] { width: 140px; }
        input:focus { border-color: var(--node-color); box-shadow: 0 0 5px rgba(59, 130, 246, 0.5); }
        
        .btn { padding: 10px 18px; border: none; border-radius: 6px; cursor: pointer; font-weight: 600; font-size: 0.95rem; transition: all 0.2s; color: white; text-transform: uppercase; letter-spacing: 0.5px; }
        .btn:active { transform: scale(0.98); }
        .btn-blue { background: #2563eb; width: 100%; }
        .btn-blue:hover { background: #1d4ed8; box-shadow: 0 0 10px rgba(37, 99, 235, 0.4); }
        .btn-green { background: #059669; width: 100%; font-size: 1.05rem; }
        .btn-green:hover { background: #047857; box-shadow: 0 0 10px rgba(5, 150, 105, 0.4); }

        .budget-hint { font-size: 0.85rem; color: #cbd5e1; text-align: right; background: rgba(255,255,255,0.05); padding: 5px 10px; border-radius: 4px;}

        .split-container { display: flex; gap: 20px; flex-wrap: wrap; }
        .half { flex: 1; min-width: 450px; background: var(--card-bg); padding: 20px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.3); border: 1px solid var(--border-color); display: flex; flex-direction: column; }
        .half h3 { margin-top: 0; text-align: center; font-weight: 700; text-shadow: 0 0 8px rgba(255,255,255,0.1); }
        
        canvas.map { background: #0b1120; border: 1px solid var(--border-color); border-radius: 8px; width: 100%; height: 350px; margin-bottom: 15px; box-shadow: inset 0 0 20px rgba(0,0,0,0.5); }
        .chart-container { width: 100%; height: 250px; position: relative; }
        
        .stats { background: #0f172a; padding: 12px; border-radius: 8px; text-align: center; font-weight: 600; font-size: 1rem; margin-bottom: 15px; border: 1px solid var(--border-color); }
        .dij-text { color: var(--dij-color); text-shadow: 0 0 5px rgba(239, 68, 68, 0.3); }
        .sota-text { color: var(--sota-color); text-shadow: 0 0 5px rgba(16, 185, 129, 0.3); }
        
        ::-webkit-scrollbar { width: 8px; height: 8px; }
        ::-webkit-scrollbar-thumb { background: #475569; border-radius: 4px; }
    </style>
</head>
<body>

    <div class="header">
        <h2>Intelligent Routing: SOTA vs Dijkstra</h2>
        <p>Synced Scales, Overlap Detection, & Simulative Dashboard</p>
    </div>

    <div class="controls-container">
        <div class="control-group">
            <h3>1. Map Settings</h3>
            <div class="input-row"><label>Total Nodes:</label> <input type="number" id="nodeCount" value="25" min="5" max="60"></div>
            <div class="input-row"><label>Max Edge Time:</label> <input type="number" id="maxTime" value="6" min="2" max="15"></div>
            <button class="btn btn-blue" onclick="generateGraph()">Generate Connected Map</button>
        </div>

        <div class="control-group">
            <h3>2. Route Parameters</h3>
            <div class="input-row">
                <label>Source ➔ Dest ID:</label> 
                <div>
                    <input type="number" id="source" value="0" min="0" onchange="updateSuggestedBudget()"> ➔ 
                    <input type="number" id="dest" value="24" min="0" onchange="updateSuggestedBudget()">
                </div>
            </div>
            <div class="input-row">
                <label>Waypoints (Stops):</label> 
                <input type="text" id="waypoints" placeholder="e.g. 5,12" onchange="updateSuggestedBudget()">
            </div>
            <div class="input-row">
                <label>Time Budget (T):</label> 
                <input type="number" id="budget" value="40" min="1">
            </div>
            <div class="budget-hint" id="budgetHint">Expected Time: -- | Suggested Range (±30%): -- to --</div>
            <button class="btn btn-green" onclick="runSimulation()">▶ Run Simulation</button>
        </div>
    </div>

    <div class="split-container">
        <div class="half">
            <h3 class="dij-text">Deterministic (Dijkstra)</h3>
            <canvas id="dijCanvas" class="map"></canvas>
            <div id="dijStats" class="stats dij-text">Waiting to run...</div>
            <div class="chart-container"><canvas id="dijChart"></canvas></div>
        </div>

        <div class="half">
            <h3 class="sota-text">Stochastic (SOTA A*)</h3>
            <canvas id="sotaCanvas" class="map"></canvas>
            <div id="sotaStats" class="stats sota-text">Waiting to run...</div>
            <div class="chart-container"><canvas id="sotaChart"></canvas></div>
        </div>
    </div>

    <script>
        Chart.defaults.color = '#94a3b8';
        Chart.defaults.borderColor = '#334155';

        // --- Globals ---
        let nodes = [], edges = [], numNodes = 0;
        let dijChartInst = null, sotaChartInst = null;
        let animationFrames = []; 

        // --- Math Helpers ---
        function convolve(pmf1, pmf2) {
            let res = new Array(pmf1.length + pmf2.length - 1).fill(0);
            for (let i = 0; i < pmf1.length; i++) {
                for (let j = 0; j < pmf2.length; j++) { res[i + j] += pmf1[i] * pmf2[j]; }
            }
            let sum = res.reduce((a, b) => a + b, 0);
            return res.map(val => val / sum);
        }

        function generatePMF(maxTime) {
            let len = Math.floor(Math.random() * maxTime) + 2; 
            let raw = Array.from({length: len}, () => Math.random());
            let sum = raw.reduce((a, b) => a + b, 0);
            return raw.map(v => v / sum);
        }

        function getExpectedTime(pmf) {
            return pmf.reduce((sum, prob, time) => sum + (time * prob), 0);
        }

        // --- Map Generation (MST + KNN) ---
        function generateGraph() {
            numNodes = parseInt(document.getElementById('nodeCount').value);
            let maxTime = parseInt(document.getElementById('maxTime').value);
            
            document.getElementById('dest').value = numNodes - 1; 
            document.getElementById('source').max = numNodes - 1;
            document.getElementById('dest').max = numNodes - 1;

            nodes = []; edges = [];
            
            for (let i = 0; i < numNodes; i++) {
                nodes.push({ id: i, x: 50 + Math.random() * 800, y: 50 + Math.random() * 250 });
            }

            let unvisited = new Set(nodes.map(n => n.id));
            let visited = [0]; unvisited.delete(0);

            function addEdge(u, v) {
                if (!edges.some(e => (e.u === u && e.v === v) || (e.u === v && e.v === u))) {
                    let pmf = generatePMF(maxTime), expT = getExpectedTime(pmf);
                    edges.push({ u: u, v: v, pmf: pmf, expTime: expT });
                    edges.push({ u: v, v: u, pmf: pmf, expTime: expT }); 
                }
            }

            // Guaranteed Connectivity (MST)
            while(unvisited.size > 0) {
                let bestDist = Infinity, bestU = -1, bestV = -1;
                for(let u of visited) {
                    for(let v of unvisited) {
                        let d = Math.hypot(nodes[u].x - nodes[v].x, nodes[u].y - nodes[v].y);
                        if(d < bestDist) { bestDist = d; bestU = u; bestV = v; }
                    }
                }
                addEdge(bestU, bestV); visited.push(bestV); unvisited.delete(bestV);
            }

            // Cross-connections
            for (let i = 0; i < numNodes; i++) {
                let dists = nodes.map(n => ({ id: n.id, d: Math.hypot(n.x - nodes[i].x, n.y - nodes[i].y) }))
                                 .filter(n => n.id !== i).sort((a, b) => a.d - b.d);
                for (let j = 0; j < 2; j++) { addEdge(i, dists[j].id); }
            }
            
            clearOutputs(); drawBaseMap('dijCanvas'); drawBaseMap('sotaCanvas'); updateSuggestedBudget();
        }

        function runDijkstra(start, goal) {
            let dist = Array(numNodes).fill(Infinity), prev = Array(numNodes).fill(null), pq = [{id: start, cost: 0}];
            dist[start] = 0;

            while (pq.length > 0) {
                pq.sort((a, b) => a.cost - b.cost);
                let curr = pq.shift();
                if (curr.id === goal) break;

                edges.filter(e => e.u === curr.id).forEach(edge => {
                    let alt = dist[curr.id] + edge.expTime;
                    if (alt < dist[edge.v]) { dist[edge.v] = alt; prev[edge.v] = curr.id; pq.push({id: edge.v, cost: alt}); }
                });
            }
            let path = [], curr = goal;
            while (curr !== null) { path.unshift(curr); curr = prev[curr]; }
            return path[0] === start ? path : null; 
        }

        function getCleanRouteSequence() {
            let src = parseInt(document.getElementById('source').value), dst = parseInt(document.getElementById('dest').value);
            let wpStr = document.getElementById('waypoints').value.trim(), seq = [src];
            if (wpStr) {
                wpStr.split(',').forEach(w => {
                    let val = parseInt(w.trim());
                    if(!isNaN(val) && val >= 0 && val < numNodes && val !== src && val !== dst) seq.push(val);
                });
            }
            seq.push(dst); return seq;
        }

        function updateSuggestedBudget() {
            if (nodes.length === 0) return;
            let seq = getCleanRouteSequence(), totalExp = 0;
            for (let i = 0; i < seq.length - 1; i++) {
                let seg = runDijkstra(seq[i], seq[i+1]);
                if (!seg) { document.getElementById('budgetHint').innerText = "Path error."; return; }
                for(let j=0; j<seg.length-1; j++) totalExp += edges.find(e => e.u === seg[j] && e.v === seg[j+1]).expTime;
            }
            totalExp = Math.round(totalExp);
            let minB = Math.floor(totalExp * 0.7), maxB = Math.ceil(totalExp * 1.3);
            document.getElementById('budgetHint').innerHTML = `Expected Time: <b style="color:#f8fafc">${totalExp}</b> | Suggested (±30%): <b style="color:#f8fafc">${minB} to ${maxB}</b>`;
        }

        function runSOTA(start, goal, budget) {
            let pq = [{id: start, prob: 1.0, pmf: [1.0], path: [start], expTime: 0}];
            let bestPath = null, bestProb = -1, bestPmf = null, visited = new Map();

            while (pq.length > 0) {
                pq.sort((a, b) => (b.prob - a.prob) || (Math.random() - 0.5));
                let curr = pq.shift();

                if (curr.id === goal) {
                    if (curr.prob > bestProb) { bestProb = curr.prob; bestPath = curr.path; bestPmf = curr.pmf; }
                    continue; 
                }
                if (visited.has(curr.id) && visited.get(curr.id) >= curr.prob) continue;
                visited.set(curr.id, curr.prob);

                edges.filter(e => e.u === curr.id).forEach(edge => {
                    if (curr.path.includes(edge.v)) return; 
                    let newPmf = convolve(curr.pmf, edge.pmf), maxIdx = Math.min(budget, newPmf.length - 1);
                    let newProb = newPmf.slice(0, maxIdx + 1).reduce((a, b) => a + b, 0);

                    if (newProb > 0) pq.push({ id: edge.v, prob: newProb, pmf: newPmf, path: [...curr.path, edge.v], expTime: curr.expTime + edge.expTime });
                });
                if (pq.length > 8000) break; 
            }
            return bestPath ? {path: bestPath, pmf: bestPmf, prob: bestProb} : null;
        }

        function calculatePathPMF(pathSeq) {
            let totalPmf = [1.0];
            for (let i = 0; i < pathSeq.length - 1; i++) {
                let edge = edges.find(e => e.u === pathSeq[i] && e.v === pathSeq[i+1]);
                totalPmf = convolve(totalPmf, edge.pmf);
            }
            return totalPmf;
        }

        function runSimulation() {
            if (nodes.length === 0) return;
            clearOutputs();

            let budget = parseInt(document.getElementById('budget').value), routeSeq = getCleanRouteSequence();

            // Paths & PMFs
            let dijFullSeq = [];
            for (let i = 0; i < routeSeq.length - 1; i++) {
                let seg = runDijkstra(routeSeq[i], routeSeq[i+1]);
                if (i > 0) seg.shift();
                dijFullSeq.push(...seg);
            }
            let dijPmf = calculatePathPMF(dijFullSeq);
            let dijProb = dijPmf.slice(0, Math.min(budget + 1, dijPmf.length)).reduce((a,b)=>a+b, 0);

            let sotaFullSeq = [];
            for (let i = 0; i < routeSeq.length - 1; i++) {
                let sotaSeg = runSOTA(routeSeq[i], routeSeq[i+1], budget); 
                if (!sotaSeg) { sotaFullSeq = dijFullSeq; break; } 
                if (i > 0) sotaSeg.path.shift();
                sotaFullSeq.push(...sotaSeg.path);
            }
            let sotaPmf = calculatePathPMF(sotaFullSeq);
            let sotaProb = sotaPmf.slice(0, Math.min(budget + 1, sotaPmf.length)).reduce((a,b)=>a+b, 0);

            // Force synchronized X-Axis across both charts!
            let maxChartX = Math.max(dijPmf.length, sotaPmf.length) - 1;

            document.getElementById('dijStats').innerText = `Path: ${dijFullSeq.join('➔')} | Prob: ${(dijProb*100).toFixed(1)}%`;
            document.getElementById('sotaStats').innerText = `Path: ${sotaFullSeq.join('➔')} | Prob: ${(sotaProb*100).toFixed(1)}%`;
            
            renderChart('dijChart', dijPmf, budget, '#ef4444', 'Dijkstra', maxChartX);
            renderChart('sotaChart', sotaPmf, budget, '#10b981', 'SOTA', maxChartX);

            animateSmoothPath('dijCanvas', dijFullSeq, '#ef4444', routeSeq);
            animateSmoothPath('sotaCanvas', sotaFullSeq, '#10b981', routeSeq);
        }

        function drawBaseMap(canvasId) {
            let canvas = document.getElementById(canvasId), ctx = canvas.getContext('2d');
            canvas.width = 900; canvas.height = 350;
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            ctx.strokeStyle = '#1e293b'; ctx.lineWidth = 2;
            edges.forEach(e => {
                ctx.beginPath(); ctx.moveTo(nodes[e.u].x, nodes[e.u].y); ctx.lineTo(nodes[e.v].x, nodes[e.v].y); ctx.stroke();
            });

            nodes.forEach(n => {
                // Simulative Node UI: Translucent outer ring
                ctx.beginPath(); ctx.arc(n.x, n.y, 14, 0, Math.PI * 2);
                ctx.fillStyle = 'rgba(51, 65, 85, 0.3)'; ctx.fill();
                ctx.strokeStyle = '#1e293b'; ctx.lineWidth = 1; ctx.stroke();

                // Solid inner core background for text
                ctx.beginPath(); ctx.arc(n.x, n.y, 9, 0, Math.PI * 2);
                ctx.fillStyle = '#0b1120'; ctx.fill();
                
                ctx.fillStyle = '#e2e8f0'; ctx.font = 'bold 10px sans-serif'; 
                ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
                ctx.fillText(n.id, n.x, n.y);
            });
        }

        function animateSmoothPath(canvasId, pathIds, color, routeSeq) {
            let canvas = document.getElementById(canvasId), ctx = canvas.getContext('2d');
            let currentEdgeIdx = 0, progress = 0, animationSpeed = 0.05;

            function renderFrame() {
                drawBaseMap(canvasId); 
                ctx.lineCap = 'round'; ctx.lineJoin = 'round';
                
                // Track overlapping edge counts
                let edgeFreq = {};
                function getEdgeKey(u, v) { return u < v ? `${u}-${v}` : `${v}-${u}`; }

                // Draw completed segments
                for (let i = 0; i < currentEdgeIdx; i++) {
                    let u = nodes[pathIds[i]], v = nodes[pathIds[i+1]];
                    let key = getEdgeKey(pathIds[i], pathIds[i+1]);
                    edgeFreq[key] = (edgeFreq[key] || 0) + 1;

                    ctx.beginPath(); ctx.moveTo(u.x, u.y); ctx.lineTo(v.x, v.y);
                    ctx.strokeStyle = color; ctx.lineWidth = 4; ctx.stroke();

                    // Intensify overlapping paths (draw white core)
                    if (edgeFreq[key] > 1) {
                        ctx.strokeStyle = '#ffffff'; ctx.lineWidth = 2; ctx.stroke();
                    }
                }

                // Draw active segment
                if (currentEdgeIdx < pathIds.length - 1) {
                    let u = nodes[pathIds[currentEdgeIdx]], v = nodes[pathIds[currentEdgeIdx + 1]];
                    let currX = u.x + (v.x - u.x) * progress, currY = u.y + (v.y - u.y) * progress;
                    
                    let key = getEdgeKey(pathIds[currentEdgeIdx], pathIds[currentEdgeIdx+1]);
                    let activeCount = (edgeFreq[key] || 0) + 1;

                    ctx.beginPath(); ctx.moveTo(u.x, u.y); ctx.lineTo(currX, currY);
                    ctx.strokeStyle = color; ctx.lineWidth = 4; ctx.stroke();
                    
                    if (activeCount > 1) { ctx.strokeStyle = '#ffffff'; ctx.lineWidth = 2; ctx.stroke(); }

                    // Glowing front pointer!
                    ctx.beginPath(); ctx.arc(currX, currY, 6, 0, Math.PI * 2);
                    ctx.fillStyle = '#ffffff';
                    ctx.shadowBlur = 15; ctx.shadowColor = color;
                    ctx.fill(); ctx.shadowBlur = 0;

                    progress += animationSpeed;
                    if (progress >= 1.0) { progress = 0; currentEdgeIdx++; }
                    animationFrames.push(requestAnimationFrame(renderFrame));
                } else {
                    // Animation Finished: Highlight the active nodes with custom rings
                    pathIds.forEach(id => {
                        let n = nodes[id];
                        let isSpecial = (id === routeSeq[0] || id === routeSeq[routeSeq.length-1] || routeSeq.includes(id));
                        
                        if (isSpecial) {
                            let specColor = id === routeSeq[0] ? '#3b82f6' : id === routeSeq[routeSeq.length-1] ? '#ef4444' : '#f59e0b';
                            
                            // Pulse Ring
                            ctx.beginPath(); ctx.arc(n.x, n.y, 17, 0, Math.PI * 2);
                            ctx.fillStyle = specColor + '40'; // hex transparency
                            ctx.fill(); ctx.strokeStyle = specColor; ctx.lineWidth = 2; ctx.stroke();

                            ctx.beginPath(); ctx.arc(n.x, n.y, 10, 0, Math.PI * 2);
                            ctx.fillStyle = specColor; ctx.fill();
                        } else {
                            // Standard path node
                            ctx.beginPath(); ctx.arc(n.x, n.y, 10, 0, Math.PI * 2);
                            ctx.fillStyle = color; ctx.fill();
                        }
                        ctx.fillStyle = '#ffffff'; ctx.font = 'bold 11px sans-serif';
                        ctx.fillText(n.id, n.x, n.y);
                    });
                }
            }
            renderFrame();
        }

        function clearOutputs() {
            animationFrames.forEach(cancelAnimationFrame); animationFrames = [];
            if(dijChartInst) dijChartInst.destroy(); if(sotaChartInst) sotaChartInst.destroy();
        }

        function renderChart(canvasId, pmf, budget, color, label, maxChartX) {
            let ctx = document.getElementById(canvasId).getContext('2d');
            
            // Pad arrays to the synchronized Max X so scales align perfectly
            let paddedPmf = [...pmf];
            while(paddedPmf.length <= maxChartX + 1) paddedPmf.push(0);
            
            let labels = Array.from({length: maxChartX + 1}, (_, i) => i);
            let cdf = []; paddedPmf.reduce((acc, val) => { let sum = acc + val; cdf.push(sum); return sum; }, 0);

            let config = {
                type: 'bar',
                data: {
                    labels: labels,
                    datasets: [
                        { label: `${label} PMF (PDF)`, data: paddedPmf, backgroundColor: color, order: 2, barPercentage: 1.0, categoryPercentage: 0.9 },
                        { label: `${label} CDF`, data: cdf, type: 'line', borderColor: '#3b82f6', fill: false, tension: 0, stepped: 'middle', borderWidth: 2, order: 1 }
                    ]
                },
                options: {
                    responsive: true, maintainAspectRatio: false,
                    interaction: { mode: 'index', intersect: false },
                    plugins: { tooltip: { callbacks: { label: (ctx) => `${ctx.dataset.label}: ${(ctx.raw*100).toFixed(2)}%` } } },
                    scales: { 
                        x: { grid: { color: '#334155' }, title: { display: true, text: 'Time Units', color: '#94a3b8' }, max: maxChartX },
                        y: { grid: { color: '#334155' }, beginAtZero: true, max: 1.0, title: { display: true, text: 'Probability', color: '#94a3b8' } } 
                    }
                }
            };
            if (canvasId === 'dijChart') dijChartInst = new Chart(ctx, config);
            else sotaChartInst = new Chart(ctx, config);
        }

        window.onload = generateGraph;
    </script>
</body>
</html>
